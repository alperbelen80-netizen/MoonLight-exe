name: MoonLight Windows Installer Build

# =============================================================================
# MoonLight v2.7.5 — Simplified Windows NSIS installer pipeline (DeepResearch v3)
# =============================================================================
# Triggers: SemVer tag push `v*.*.*` or manual workflow_dispatch.
# Repo layout: `moonlight/` is a monorepo subdirectory at repo root.
# All commands run under `pwsh` (PowerShell 7) on `windows-latest`.
# =============================================================================

on:
  push:
    tags:
      # Any tag starting with `v` (v2.8.6, v3.0.0, v10.1.0-beta, v1, etc.)
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to embed in installer (e.g. 2.8.6). Leave empty to keep package.json version.'
        required: false
        default: ''

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: Build Windows EXE (NSIS x64)
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NOTE: Intentionally NO `cache: 'yarn'` nor `cache-dependency-path`
          # here — those fail the job when yarn.lock is missing/drifted.

      - name: Toolchain info
        run: |
          node --version
          yarn --version
          npm --version
          Write-Host "pwsh: $($PSVersionTable.PSVersion)"

      - name: Sync desktop version from tag or input (if any)
        working-directory: moonlight/desktop
        run: |
          $ref = "${{ github.ref }}"
          $inputVersion = "${{ github.event.inputs.version }}"
          $newVersion = $null
          if ($ref -match '^refs/tags/v(.+)$') {
            $newVersion = $Matches[1]
            Write-Host "Tag detected — syncing desktop package.json version to $newVersion"
          } elseif ($inputVersion -and $inputVersion.Trim().Length -gt 0) {
            $newVersion = $inputVersion.Trim().TrimStart('v')
            Write-Host "Manual input detected — syncing desktop package.json version to $newVersion"
          } else {
            Write-Host "No tag / input — keeping existing version in package.json."
          }
          if ($newVersion) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $pkg.version = $newVersion
            ($pkg | ConvertTo-Json -Depth 32) | Set-Content package.json -Encoding UTF8
            Write-Host "package.json.version is now: $newVersion"
          }

      - name: Install root deps
        working-directory: moonlight
        run: yarn install --no-immutable --network-timeout 600000

      - name: Install backend deps
        working-directory: moonlight/backend
        run: yarn install --no-immutable --network-timeout 600000

      - name: Install desktop deps
        working-directory: moonlight/desktop
        run: yarn install --no-immutable --network-timeout 600000

      - name: TypeScript check (backend)
        working-directory: moonlight/backend
        run: npx tsc --noEmit

      - name: TypeScript check (desktop)
        working-directory: moonlight/desktop
        run: npx tsc --noEmit

      - name: Build backend (nest build)
        working-directory: moonlight
        run: yarn build:backend

      - name: Bundle backend (esbuild minified)
        working-directory: moonlight
        run: yarn bundle:backend:prod

      - name: Verify backend bundle
        run: |
          $bundle = "moonlight/dist-bundle/backend.js"
          if (-Not (Test-Path $bundle)) {
            Write-Error "Bundle missing: $bundle"
            exit 1
          }
          $size = (Get-Item $bundle).Length
          Write-Host "Bundle: $([math]::Round($size/1KB,1)) KB"
          if ($size -lt 102400) {
            Write-Error "Bundle too small ($size bytes < 100 KB)"
            exit 1
          }

      - name: Install backend runtime deps (natives)
        working-directory: moonlight/backend
        run: |
          npm install --omit=dev --no-package-lock --no-audit --no-fund --legacy-peer-deps
          if (-Not (Test-Path "node_modules/sqlite3")) {
            Write-Error "sqlite3 missing under backend/node_modules"
            exit 1
          }

      - name: Build desktop (renderer + main + preload)
        working-directory: moonlight
        run: yarn build:desktop

      - name: Verify desktop build
        run: |
          foreach ($dir in @("moonlight/desktop/dist-electron", "moonlight/desktop/dist-renderer")) {
            if (-Not (Test-Path $dir)) {
              Write-Error "Missing: $dir"; exit 1
            }
            Write-Host "OK: $dir"
          }

      - name: Package Windows installer (NSIS x64)
        working-directory: moonlight/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          EP_PRE_RELEASE: 'false'
        run: |
          yarn dist:win:ci

      - name: Verify EXE
        run: |
          $exes = Get-ChildItem "moonlight/desktop/dist" -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $exes -or $exes.Count -eq 0) {
            Write-Error "No .exe produced"
            Get-ChildItem "moonlight/desktop/dist" -ErrorAction SilentlyContinue | Format-Table -AutoSize
            exit 1
          }
          $failed = $false
          foreach ($exe in $exes) {
            $sizeMB = [math]::Round($exe.Length / 1MB, 2)
            Write-Host "EXE: $($exe.Name) — $sizeMB MB"
            if ($exe.Length -lt 10485760) {
              Write-Error "$($exe.Name) is only $sizeMB MB (<10 MB)"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: SHA256 checksums
        working-directory: moonlight/desktop/dist
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.Name).sha256" -Encoding ASCII
            Write-Host "SHA256($($_.Name)) = $hash"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moonlight-windows-installer
          path: |
            moonlight/desktop/dist/*.exe
            moonlight/desktop/dist/*.exe.sha256
            moonlight/desktop/dist/latest.yml
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-build-logs-${{ github.run_id }}
          path: |
            moonlight/dist-bundle/
            moonlight/backend/dist/
            moonlight/desktop/dist/
            moonlight/desktop/dist-electron/
            moonlight/desktop/dist-renderer/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            moonlight/desktop/dist/*.exe
            moonlight/desktop/dist/*.exe.sha256
            moonlight/desktop/dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Failure summary
        if: failure()
        run: |
          Write-Host "::error::==== MoonLight build FAILED ===="
          Write-Host "Run ID : ${{ github.run_id }}"
          Write-Host "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          Write-Host "Ref    : ${{ github.ref }}"
          Write-Host "Commit : ${{ github.sha }}"
          Write-Host ""
          Write-Host "Next actions:"
          Write-Host "  • Check the failed step's log above"
          Write-Host "  • Download 'moonlight-build-logs-${{ github.run_id }}' artifact"
          Write-Host "  • See moonlight/docs/TROUBLESHOOTING.md"
