name: CI

# MoonLight — Continuous Integration (v2.7.0)
#
# Runs on every push to main/develop and on every PR to main.
# Repo layout: `moonlight/` is a sub-directory (monorepo).
#
# Covers:
#   - Backend Jest suite
#   - Desktop Vitest suite (BackendManager etc.)
#   - TypeScript strict type check (backend + desktop)
#   - Backend build + single-file bundle
#   - Desktop renderer build
#   - Bundled-spawn smoke test
#   - (Best-effort) Linux `--dir` packaging smoke

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: moonlight

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'moonlight/yarn.lock'

      - name: Install root (monorepo) dependencies
        run: yarn install --frozen-lockfile --network-timeout 300000

      - name: TypeScript type check (backend + desktop)
        run: yarn typecheck

      - name: Run backend Jest suite
        working-directory: moonlight/backend
        run: yarn test

      - name: Run desktop Vitest suite
        working-directory: moonlight/desktop
        run: yarn test

      - name: Build backend (NestJS compile)
        run: yarn build:backend

      - name: Bundle backend (esbuild single-file)
        run: yarn bundle:backend

      - name: Run bundled-spawn smoke test
        run: yarn smoke:bundle
        timeout-minutes: 3

      - name: Build desktop renderer + main
        run: yarn build:desktop

      - name: Package Linux (dir only — no installer)
        working-directory: moonlight/desktop
        run: yarn dist:dir
        continue-on-error: true

      - name: Upload Linux packaged dir (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moonlight-linux-dir-${{ github.sha }}
          path: moonlight/desktop/dist/linux-unpacked
          if-no-files-found: ignore
          retention-days: 7
