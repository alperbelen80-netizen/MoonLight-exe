name: Release Windows Installer

# MoonLight v2.6-10 — Windows NSIS installer release pipeline.
#
# Trigger:
#   - Push a SemVer tag like `v2.6.10` to build + publish installer.
#   - Or run manually via the "Run workflow" button (workflow_dispatch).
#
# Output:
#   - `desktop/dist/MoonLight-Owner-<version>-win-x64.exe` (NSIS installer)
#   - `desktop/dist/*.exe.sha256` checksum file
#   - `desktop/dist/latest.yml` (auto-update metadata)
#   - Uploaded as workflow artifact, and (on tag) attached to a GitHub Release.
#
# Shell: `pwsh` (PowerShell 7) is the default for all run steps below.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release even without a tag'
        required: false
        default: 'false'

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build-windows-installer:
    name: Build MoonLight Windows Installer
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      # Keep electron-builder cache stable across re-runs.
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      # Let our production config honor "packaged" mode where appropriate.
      MOONLIGHT_PACKAGED: 'true'
      # Disable code-signing unless a cert is provided as a repo secret.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      # 1) Checkout source
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Node 20 toolchain + yarn cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      # 3) Toolchain diagnostics (makes CI logs self-documenting)
      - name: Toolchain diagnostics
        run: |
          Write-Host "=== Toolchain ==="
          node --version
          yarn --version
          npm --version
          Write-Host "runner.os     = $env:RUNNER_OS"
          Write-Host "runner.arch   = $env:RUNNER_ARCH"
          Write-Host "workspace     = $env:GITHUB_WORKSPACE"
          Write-Host "pwsh version  = $($PSVersionTable.PSVersion)"
          Write-Host "=================="

      # 4) Electron binary cache (speeds up repeat runs)
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # 5) Install root (monorepo) dependencies
      - name: Install monorepo dependencies
        run: yarn install --frozen-lockfile

      # 6) Build backend (TS → dist) + esbuild single-file bundle
      #    `build:all` is the single deterministic command defined in the
      #    root package.json (v2.6-10 orchestration).
      - name: Build backend + bundle + desktop (build:all)
        run: yarn build:all

      # 7) Verify backend bundle was produced and is reasonably sized.
      #    A regression that silently produces an empty bundle would
      #    otherwise slip all the way into the installer — we fail fast.
      - name: Verify backend bundle
        run: |
          $bundle = "dist-bundle\backend.js"
          if (-Not (Test-Path $bundle)) {
            Write-Error "Backend bundle missing: $bundle (yarn build:all failed silently?)"
            exit 1
          }
          $size = (Get-Item $bundle).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "Backend bundle OK: $bundle ($sizeMB MB / $size bytes)"
          if ($size -lt 1MB) {
            Write-Error "Backend bundle suspiciously small ($sizeMB MB < 1 MB); aborting."
            exit 1
          }

      # 8) Install an ISOLATED backend/node_modules for runtime native deps
      #    (sqlite3, ws, ccxt, etc.). npm keeps them local to the backend
      #    workspace (no yarn hoisting), which is exactly what the
      #    packaged `backend-bundle/node_modules` needs.
      - name: Install isolated backend runtime deps (Windows natives)
        working-directory: backend
        run: |
          npm install --omit=dev --no-package-lock --no-audit --no-fund
          if (-Not (Test-Path "node_modules\sqlite3")) {
            Write-Error "sqlite3 missing in backend/node_modules after install"
            exit 1
          }
          Write-Host "Backend runtime deps installed under backend/node_modules"

      # 9) Rebuild native modules against Electron's ABI so the spawned
      #    backend (via ELECTRON_RUN_AS_NODE=1) can load them.
      - name: Rebuild native modules for Electron ABI
        working-directory: desktop
        run: |
          yarn install --frozen-lockfile
          npx --yes @electron/rebuild -m ..\backend\node_modules -o sqlite3,keytar,bufferutil,utf-8-validate -f
        continue-on-error: true

      # 10) Package Windows installer (NSIS x64).
      #     `prepackage-check.js` runs automatically as the `prepackage` hook.
      - name: Package Windows installer (NSIS x64)
        working-directory: desktop
        run: yarn dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11) Verify installer artifact: must exist and be > 10MB.
      - name: Verify installer artifact
        working-directory: desktop/dist
        run: |
          Write-Host "=== desktop/dist contents ==="
          Get-ChildItem | Format-Table -AutoSize
          $installer = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          if (-Not $installer) {
            Write-Error "No .exe installer produced under desktop/dist"
            exit 1
          }
          $sizeMB = [math]::Round($installer.Length / 1MB, 2)
          Write-Host "Installer: $($installer.Name) ($sizeMB MB)"
          if ($installer.Length -lt 10MB) {
            Write-Error "Installer too small ($sizeMB MB < 10 MB); likely broken."
            exit 1
          }
          Write-Host "Installer size OK."

      # 12) Generate SHA256 checksums for every .exe.
      - name: Generate SHA256 checksums
        working-directory: desktop/dist
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            $line = "$hash  $($_.Name)"
            $line | Out-File -FilePath "$($_.Name).sha256" -Encoding ASCII
            Write-Host "sha256($($_.Name)) = $hash"
          }
          Get-ChildItem -Filter "*.sha256" | Format-Table -AutoSize

      # 13a) Always upload installer as a workflow artifact.
      - name: Upload Windows installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-owner-installer-windows
          path: |
            desktop/dist/*.exe
            desktop/dist/*.exe.sha256
            desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 30

      # 13b) On tag push OR explicit workflow_dispatch opt-in, attach to a GitHub Release.
      - name: Create GitHub Release (tag only or explicit opt-in)
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/*.exe.sha256
            desktop/dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
