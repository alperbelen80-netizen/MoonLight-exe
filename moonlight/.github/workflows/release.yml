name: Release Windows Installer

# MoonLight v2.6-3 — Windows NSIS installer release pipeline.
#
# Trigger:
#   - Push a SemVer tag like `v2.6.3` to `main` to build + publish installer.
#   - Or run manually via the "Run workflow" button (workflow_dispatch).
#
# Output:
#   - `desktop/dist/MoonLight-Owner-<version>-win-x64.exe` (NSIS installer)
#   - `desktop/dist/*.exe.sha256` checksum file
#   - Uploaded as workflow artifact, and (on tag) attached to a GitHub Release.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release even without a tag'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      # Keep electron-builder cache stable across re-runs.
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      # Let our production config honor "packaged" mode where appropriate.
      MOONLIGHT_PACKAGED: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Show toolchain
        shell: pwsh
        run: |
          node --version
          yarn --version
          npm --version

      - name: Cache electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install root (monorepo) dependencies
        run: yarn install --frozen-lockfile

      - name: Build backend (TypeScript → dist)
        run: yarn build:backend

      - name: Bundle backend (esbuild, minified)
        run: yarn bundle:backend:prod

      # Install an ISOLATED backend/node_modules for runtime native deps
      # (sqlite3, ws, ccxt, etc.). npm keeps them local to the backend
      # workspace (no yarn hoisting), which is exactly what the
      # packaged `backend-bundle/node_modules` needs.
      - name: Install isolated backend runtime deps (Windows natives)
        shell: pwsh
        run: |
          cd backend
          npm install --omit=dev --no-package-lock --no-audit --no-fund
          # sanity check
          if (-Not (Test-Path "node_modules/sqlite3")) {
            Write-Error "sqlite3 missing in backend/node_modules after install"
            exit 1
          }
          Write-Host "Backend runtime deps installed under backend/node_modules"

      # Rebuild native modules against Electron's ABI so the spawned
      # backend (via ELECTRON_RUN_AS_NODE=1) can load them.
      - name: Rebuild native modules for Electron ABI
        shell: pwsh
        run: |
          cd desktop
          yarn install --frozen-lockfile
          # @electron/rebuild is a transitive dep of electron-builder;
          # calling it explicitly gives us better logs.
          npx --yes @electron/rebuild -m ../backend/node_modules -o sqlite3,keytar,bufferutil,utf-8-validate -f
        continue-on-error: true

      - name: Build desktop (renderer + main + preload)
        run: yarn build:desktop

      - name: Package Windows installer (NSIS x64)
        shell: pwsh
        working-directory: desktop
        run: yarn dist:win
        env:
          # Suppress auto-publish; we upload manually below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code-signing unless a cert is provided.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Generate SHA256 checksums
        shell: pwsh
        working-directory: desktop/dist
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.Name).sha256" -Encoding ASCII
            Write-Host "sha256($($_.Name)) = $hash"
          }
          Get-ChildItem

      - name: Upload Windows installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-owner-installer-windows
          path: |
            desktop/dist/*.exe
            desktop/dist/*.exe.sha256
            desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/*.exe.sha256
            desktop/dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
